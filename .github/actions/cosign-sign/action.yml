name: Cosign sign images
description: Sign image tags with digest via cosign

inputs:
  digest:
    required: true
    description: Built image digest
  tags:
    required: true
    description: Space-separated image tags

runs:
  using: composite
  steps:
    - name: Sign images
      shell: bash
      env:
        DIGEST: ${{ inputs.digest }}
        TAGS: ${{ inputs.tags }}
      run: |
        set -euo pipefail

        images=()
        for tag in ${TAGS}; do
          images+=("${tag}@${DIGEST}")
        done

        echo "::group::Images to sign"
        printf '%s\n' "${images[@]}"
        echo "::endgroup::"

        echo "::group::Signing"
        cosign sign --yes "${images[@]}"
        echo "::endgroup::"
